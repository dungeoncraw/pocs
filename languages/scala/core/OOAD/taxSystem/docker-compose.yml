version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tax-system-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taxsystem
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taxsystem"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tax-system-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:postgresql://db:5432/taxsystem"
      DB_USER: "user"
      DB_PASSWORD: "password"
    depends_on:
      db:
        condition: service_healthy
