tax-system {
  db {
    profile = "slick.jdbc.PostgresProfile$"
    db {
      driver = "org.postgresql.Driver"
      url = ${?DB_URL}
      url = "jdbc:postgresql://localhost:5432/taxsystem"
      user = ${?DB_USER}
      user = "user"
      password = ${?DB_PASSWORD}
      password = "password"
      connectionPool = "HikariCP"
      maximumPoolSize = 10
      minimumIdle = 2
      keepAliveConnection = true
    }
  }
}
