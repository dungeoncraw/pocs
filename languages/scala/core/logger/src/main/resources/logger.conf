logger {
  level = "info"

  delivery {
    mode = "async"
    queueSize = 10000
    batchSize = 100
    flushIntervalMillis = 1000
  }

  sinks = [
    {
      type = "file"
      enabled = true
      path = "logs/app.log"
      format = "json"
    },
    {
      type = "elk"
      enabled = false
      endpoint = "http://localhost:9200"
      index = "application-logs"
      format = "json"
    }
  ]
}