logger {
  level = "info"

  delivery {
    mode = "sync"
    queueSize = 10000
    batchSize = 100
    flushIntervalMillis = 1000
  }

  sinks = [
    {
      type = "console"
      enabled = true
      format = "plain"
    },
    {
      type = "file"
      enabled = true
      path = "logs/app.log"
      format = "plain"
    }
  ]
}