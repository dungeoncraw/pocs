<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Spring Security CSRF Example</title>
</head>
<body>
<div style="max-width: 600px; margin: auto; padding: 20px; font-family: sans-serif;">
    <h1>CSRF Protection Demo</h1>

    <div style="background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; padding: 15px; margin-bottom: 20px;">
        <h3>Test with CSRF Token</h3>
        <p>This form uses <code>th:action</code>, which automatically includes the CSRF token.</p>
        <form th:action="@{/process}" method="post">
            <button type="submit" style="background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px;">Submit WITH CSRF token (Should Succeed)</button>
        </form>
    </div>

    <div style="background-color: #fff3f3; border: 1px solid #ffc9c9; border-radius: 4px; padding: 15px;">
        <h3>Test without CSRF Token</h3>
        <p>This form uses a plain <code>action</code>, bypassing Thymeleaf's automatic token injection.</p>
        <form action="/process" method="post">
            <button type="submit" style="background-color: #dc3545; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px;">Submit WITHOUT CSRF token (Should fail with 403)</button>
        </form>
    </div>
</div>
</body>
</html>
